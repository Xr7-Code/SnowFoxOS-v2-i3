# ============================================================
#  SnowFoxOS — Picom (minimal, nur abgerundete Ecken + Opacity)
# ============================================================

# Backend: xrender ist leichter als glx, reicht für Ecken/Opacity
backend = "xrender";
vsync = false;

# Schatten — aus (spart RAM + CPU)
shadow = false;

# Fading — aus
fading = false;

# Abgerundete Ecken
corner-radius = 10;
rounded-corners-exclude = [
    "class_g != 'Rofi'"
];

# Transparenz für inaktive Fenster (optional, auskommentieren wenn nicht gewünscht)
# inactive-opacity = 0.95;
# active-opacity = 1.0;
# frame-opacity = 1.0;

# Fokus-Transparenz für Terminals
opacity-rule = [
    "95:class_g = 'kitty' && !focused",
    "100:class_g = 'kitty' && focused"
];

# Nicht compositen was nicht nötig ist
wintypes:
{
    dock        = { shadow = false; clip-shadow-above = true; };
    dnd         = { shadow = false; };
    popup_menu  = { shadow = false; opacity = 1.0; };
    dropdown_menu = { shadow = false; opacity = 1.0; };
    tooltip     = { shadow = false; opacity = 1.0; };
};
