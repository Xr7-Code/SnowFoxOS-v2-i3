; ============================================================
;  SnowFoxOS v2.1 — Polybar Config (Optimized)
; ============================================================

[colors]
purple = #9B59B6
orange = #E67E22
bg     = #0f0f0f
fg     = #e8e8e8
gray   = #b0b0b0
red    = #e05555
green  = #5faf5f

[bar/snowfox]
width = 100%
height = 32
radius = 0
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 2
border-size = 0
padding-left = 1
padding-right = 1
module-margin-left = 1
module-margin-right = 1

font-0 = Inter:size=10;2
font-1 = Noto Sans:size=10;2
font-2 = "Noto Color Emoji:scale=8;3"
font-3 = "Font Awesome 6 Free Solid:size=10;2"

; 'tray' wurde aus modules-right entfernt, da es jetzt global gesteuert wird
modules-left = menu i3
modules-center = date
modules-right = memory network pulseaudio backlight battery

; i3 Einstellungen
wm-restack = i3
override-redirect = false

; --- Neues Tray-Handling (v3.6.0+) ---
tray-position = right
tray-maxsize = 18
tray-padding = 4
tray-background = ${colors.bg}

; ── Fuchs Menü ───────────────────────────────────────────────
[module/menu]
type = custom/text
content = %{A1:rofi -show drun -theme ~/.config/rofi/config.rasi:}🦊%{A}
content-font = 3
content-foreground = ${colors.purple}
content-padding = 1

; ── i3 Workspaces ────────────────────────────────────────────
[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.orange}
label-focused = %index%
label-focused-foreground = ${colors.purple}
label-focused-underline = ${colors.purple}
label-focused-padding = 2
label-unfocused = %index%
label-unfocused-foreground = ${colors.gray}
label-unfocused-padding = 2

; ── Aktives Fenster ──────────────────────────────────────────
[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.gray}

; ── Uhr ──────────────────────────────────────────────────────
[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %H:%M  %a %d.%m.%Y
label = %date%
label-foreground = ${colors.fg}

; ── RAM ──────────────────────────────────────────────────────
[module/memory]
type = internal/memory
interval = 5
format-prefix = " "
format-prefix-foreground = ${colors.gray}
label = %percentage_used%%
label-foreground = ${colors.gray}

; ── Netzwerk WLAN ────────────────────────────────────────────
[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
format-disconnected = <label-disconnected>
format-connected-prefix = " "
format-connected-prefix-foreground = ${colors.gray}
label-connected = %essid%
label-connected-foreground = ${colors.gray}
label-disconnected = "  "
label-disconnected-foreground = ${colors.red}

; ── Lautstärke ───────────────────────────────────────────────
[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
format-muted = <label-muted>
label-volume = %percentage%%
label-volume-foreground = ${colors.gray}
label-muted = " stumm"
label-muted-foreground = ${colors.red}
ramp-volume-0 = " "
ramp-volume-1 = " "
ramp-volume-2 = " "
ramp-volume-foreground = ${colors.gray}

; ── Batterie (Hardware-Namen korrigiert) ─────────────────────
[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
poll-interval = 5
full-at = 99
low-at = 15

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-low = <ramp-capacity> <label-low>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = "  voll"
label-low = %percentage%%

label-full-foreground = ${colors.green}
label-charging-foreground = ${colors.green}
label-discharging-foreground = ${colors.gray}
label-low-foreground = ${colors.red}

ramp-capacity-0 = " "
ramp-capacity-1 = " "
ramp-capacity-2 = " "
ramp-capacity-3 = " "
ramp-capacity-4 = " "
ramp-capacity-foreground = ${colors.gray}

animation-charging-0 = " "
animation-charging-1 = " "
animation-charging-2 = " "
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

; ── Helligkeit ───────────────────────────────────────────────
[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
format = <ramp> <label>
label = %percentage%%
label-foreground = ${colors.gray}
ramp-0 = " "
ramp-1 = " "
ramp-2 = " "
ramp-foreground = ${colors.gray}
